# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: credit-policy-assistant
description: |
    Credit policy assistant that grounds answers in the Azure AI Search credit-risk document index and returns source citations.
metadata:
    tags:
        - Credit Risk
        - Azure AI Search
        - RAG
        - Responses Protocol
        - Bring Your Own
        - Python
protocols:
    - protocol: responses
      version: 1.0.0
resources:
    cpu: "0.5"
    memory: 1Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-5-mini
    - name: AZURE_SEARCH_ENDPOINT
      value: https://srch-crai-dev-canadacentral-6fecno.search.windows.net
    - name: AZURE_SEARCH_INDEX_NAME
      value: credit-risk-documents
    - name: AZURE_SEARCH_TOP_K
      value: "5"
